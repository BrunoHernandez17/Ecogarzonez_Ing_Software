version: '3.8'

services:
  # Database orchestrator
  postgres-db:
    image: postgres:15-alpine
    container_name: ecogarzones-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ecogarzones_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - ecogarzones-network

  # Cache service (Redis)
  redis-cache:
    image: redis:7-alpine
    container_name: ecogarzones-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecogarzones-network

  # Event Service
  event-service:
    build:
      context: ./BackEnd/event-service
      dockerfile: Dockerfile
    container_name: event-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/ecogarzones_events
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespassword
    depends_on:
      - postgres-db
    networks:
      - ecogarzones-network

  # Billing Service
  billing-service:
    build:
      context: ./BackEnd/billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/ecogarzones_billing
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespassword
    depends_on:
      - postgres-db
    networks:
      - ecogarzones-network

  # Logistics Service
  logistics-service:
    build:
      context: ./BackEnd/logistics-service
      dockerfile: Dockerfile
    container_name: logistics-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/ecogarzones_logistics
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespassword
    depends_on:
      - postgres-db
    networks:
      - ecogarzones-network

  # Predictive Analysis Service
  predictive-analysis-service:
    build:
      context: ./BackEnd/predictive-analysis-service
      dockerfile: Dockerfile
    container_name: predictive-analysis-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis-cache
    networks:
      - ecogarzones-network

  # Frontend Web Client
  frontend-web:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: frontend-web
    ports:
      - "80:80"
    depends_on:
      - event-service
      - billing-service
      - logistics-service
      - predictive-analysis-service
    networks:
      - ecogarzones-network

volumes:
  postgres_data:
  redis_data:

networks:
  ecogarzones-network:
    driver: bridge
